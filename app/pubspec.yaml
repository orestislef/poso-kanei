name: poso_kanei
description: "πόσο κάνει — Greek grocery price-intelligence app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  http: ^1.2.2
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon_master.png"
  adaptive_icon_background: "#EEF5F0"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  web:
    generate: false
  windows:
    generate: true
    image_path: "assets/icon_master.png"

flutter:
  uses-material-design: true
  assets:
    - assets/mark.svg
