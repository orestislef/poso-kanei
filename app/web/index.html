<!DOCTYPE html>
<html lang="el">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="description" content="πόσο κάνει — σύγκριση τιμών σούπερ μάρκετ για όλη την Ελλάδα. Compare Greek supermarket prices by true €/kg, build a basket, track price history.">
  <meta name="theme-color" content="#1f6b4a">

  <!-- Open Graph -->
  <meta property="og:title" content="πόσο κάνει">
  <meta property="og:description" content="Μην ρωτάς πόσο κάνει. Ρώτα πού είναι φθηνότερο.">
  <meta property="og:type" content="website">

  <!-- iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="πόσο κάνει">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon: crisp SVG with PNG fallback -->
  <link rel="icon" type="image/svg+xml" href="mark.svg">
  <link rel="icon" type="image/png" href="favicon.png">

  <title>πόσο κάνει — σύγκριση τιμών σούπερ μάρκετ</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background-color: #f7f5ef; }
    #pk-boot {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: #14130f; transition: opacity .4s ease; z-index: 9999;
    }
    #pk-boot img { width: 84px; height: 84px; animation: pk-pop .7s cubic-bezier(.34,1.56,.64,1); }
    #pk-boot .pk-word { color: #f5f1e6; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-weight: 800; font-size: 30px; letter-spacing: -.02em; }
    #pk-boot .pk-bar { width: 180px; height: 4px; border-radius: 999px; background: rgba(255,255,255,.12); overflow: hidden; }
    #pk-boot .pk-fill { width: 40%; height: 100%; border-radius: 999px; background: linear-gradient(90deg,#3fa978,#6bcb9f); animation: pk-load 1.4s ease-in-out infinite; }
    @keyframes pk-pop { from { opacity: 0; transform: scale(.6) rotate(-12deg); } to { opacity: 1; transform: none; } }
    @keyframes pk-load { 0% { margin-left: -40%; } 100% { margin-left: 100%; } }
  </style>
</head>
<body>
  <div id="pk-boot">
    <img src="mark.svg" alt="">
    <div class="pk-word">πόσο κάνει</div>
    <div class="pk-bar"><div class="pk-fill"></div></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('pk-boot');
      if (!el) return;
      el.style.opacity = '0';
      setTimeout(function () { el.remove(); }, 420);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
